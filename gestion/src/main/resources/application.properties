# Application
spring.application.name=gestion
server.port=${SERVER_PORT:8080}


# Database: default postgres_qnt (VPS/Docker en misma red). En desarrollo local (app en tu PC, BD en Docker) setear DB_HOST=localhost.
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres_qnt}:${DB_PORT:5432}/${DB_NAME:postgres_qnt}
spring.datasource.username=${DB_USER:qntgestion}
spring.datasource.password=${DB_PASSWORD:java12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (en desarrollo usar update para crear tablas; en producción validate)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CORS: origen del frontend. En producción setear APP_CORS_ALLOWED_ORIGINS (ej. https://qnt.dronefieldoperation.cloud).
# Varios orígenes separados por coma. Si no coincide el origen, el navegador puede bloquear (403/CORS).
# Origen del front en producción
# Orígenes permitidos: producción + dev local
app.cors.allowed-origins=https://qnt.dronefieldoperation.cloud,http://localhost:5173
# JWT (en producción usar variables de entorno o secret manager)
jwt.secret=${JWT_SECRET:MyVerySecretKeyChangeInProduction}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Multipart (imagen factura en compras)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenWeatherMap
owm.api-key=${OWM_API_KEY:af7b3efbe262dec84eeb881a6cb69d10}
owm.url=https://api.openweathermap.org/data/2.5/weather
owm.sites[0].code=EFO
owm.sites[0].name=Estacion Fernandez Oro
owm.sites[0].lat=${OWM_EFO_LAT:-39.01}
owm.sites[0].lon=${OWM_EFO_LON:-67.88}
owm.sites[1].code=CL
owm.sites[1].name=Canadon Leon
owm.sites[1].lat=${OWM_CL_LAT:-46.64617}
owm.sites[1].lon=${OWM_CL_LON:-67.71842}
owm.sites[2].code=CAM
owm.sites[2].name=Canadon Amarillo
owm.sites[2].lat=${OWM_CAM_LAT:-37.4687}
owm.sites[2].lon=${OWM_CAM_LON:-69.0275}

# Logging
#logging.level.com.gestion.qnt=INFO
logging.level.org.springframework.security=WARN
logging.level.com.gestion.qnt=DEBUG
logging.level.org.springframework.web=DEBUG