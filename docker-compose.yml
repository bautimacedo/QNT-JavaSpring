# PostgreSQL para desarrollo local (QNT Gestion).
# Uso: desde la raíz del repo →  docker compose up -d
# El backend (IDE o mvn) conecta a localhost:5432 con usuario qntgestion / postgres_qnt.

services:
  postgres_qnt:
    image: postgres:16-alpine
    container_name: postgres_qnt
    restart: unless-stopped
    environment:
      POSTGRES_USER: qntgestion
      POSTGRES_PASSWORD: java12345
      POSTGRES_DB: postgres_qnt
    ports:
      - "5432:5432"
    volumes:
      - postgres_qnt_data:/var/lib/postgresql/data

volumes:
  postgres_qnt_data:
