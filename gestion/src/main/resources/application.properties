# Application
spring.application.name=gestion
server.port=${SERVER_PORT:8080}

# Database (placeholders: use env o perfil; default BD local)
# Sin variables de entorno → localhost (desarrollo local). En Docker setear DB_HOST=postgres_qnt.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres_qnt}
spring.datasource.username=${DB_USER:qntgestion}
spring.datasource.password=${DB_PASSWORD:java12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# Ejemplo Docker/prod: DB_HOST=postgres_qnt (o el host del contenedor/servidor)
# Ejemplo local: no setear nada → usa localhost

# JPA (en desarrollo usar update para crear tablas; en producción validate)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CORS: origen del frontend. En producción setear APP_CORS_ALLOWED_ORIGINS (ej. https://qnt.dronefieldoperation.cloud).
# Varios orígenes separados por coma. Si no coincide el origen, el navegador puede bloquear (403/CORS).
# Origen del front en producción
# Orígenes permitidos: producción + dev local
app.cors.allowed-origins=https://qnt.dronefieldoperation.cloud,http://localhost:5173
# JWT (en producción usar variables de entorno o secret manager)
jwt.secret=${JWT_SECRET:MyVerySecretKeyChangeInProduction}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Multipart (imagen factura en compras)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.gestion.qnt=INFO
logging.level.org.springframework.security=WARN
